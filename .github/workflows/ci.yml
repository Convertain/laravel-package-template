# =============================================================================
# Convertain Standardized CI Pipeline
# =============================================================================
# This workflow is shared across all Convertain packages (~140 packages).
# It auto-detects available composer scripts and conditionally runs stages.
#
# Stages:
#   1. Lint & Style — pint --test, rector --dry-run, composer validate
#   2. Static Analysis — phpstan analyse
#   3. Tests — phpunit (prefer-stable + prefer-lowest)
#   4. Architecture Tests — composer test:arch (if script exists)
#   5. Snapshot Tests — composer test:snapshot (if script exists)
#   6. Mutation Testing — composer test:mutation (master push only, if exists)
#   7. Code Coverage — composer test:coverage (push only, if exists)
#   8. Manifest Validation — scripts/validate-manifest.php (if exists)
#
# Execution strategy: Sequential with fail-fast to minimize runner minutes.
# =============================================================================

name: CI

run-name: CI Pipeline

on:
  push:
    branches: [master, main, "1.x"]
    tags: ['v*']
  pull_request:
    branches: [master, main, "1.x"]
  schedule:
    - cron: "35 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.COMPOSER_AUTH_TOKEN }}"}, "http-basic": {"composer.fluxui.dev": {"username": "${{ secrets.FLUX_USERNAME }}", "password": "${{ secrets.FLUX_LICENSE_KEY }}"}}}'
  PHP_VERSION: "8.5"

jobs:
  # ============================================================================
  # Stage 1: Code Style & Linting + Capability Detection
  # ============================================================================
  lint:
    name: "1. Lint & Style"
    runs-on: ubuntu-latest
    outputs:
      has-tests: ${{ steps.detect.outputs.has-tests }}
      has-test-arch: ${{ steps.detect.outputs.has-test-arch }}
      has-test-snapshot: ${{ steps.detect.outputs.has-test-snapshot }}
      has-test-mutation: ${{ steps.detect.outputs.has-test-mutation }}
      has-test-coverage: ${{ steps.detect.outputs.has-test-coverage }}
      has-manifest: ${{ steps.detect.outputs.has-manifest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Detect capabilities
        id: detect
        run: |
          SCRIPTS=$(php -r "echo implode(' ', array_keys(json_decode(file_get_contents('composer.json'), true)['scripts'] ?? []));")

          check() {
            if echo "$SCRIPTS" | tr ' ' '\n' | grep -qx "$1"; then
              echo "has-$(echo $1 | tr ':' '-')=true" >> $GITHUB_OUTPUT
            else
              echo "has-$(echo $1 | tr ':' '-')=false" >> $GITHUB_OUTPUT
            fi
          }

          check test:arch
          check test:snapshot
          check test:mutation
          check test:coverage

          # Detect if this package has tests (phpunit.xml or phpunit.xml.dist)
          if [ -f "phpunit.xml" ] || [ -f "phpunit.xml.dist" ]; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi

          # Detect manifest validation script
          if [ -f "scripts/validate-manifest.php" ]; then
            echo "has-manifest=true" >> $GITHUB_OUTPUT
          else
            echo "has-manifest=false" >> $GITHUB_OUTPUT
          fi

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Rector dry-run
        if: hashFiles('rector.php') != ''
        run: vendor/bin/rector --dry-run --no-progress-bar

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

      - name: Audit dependencies
        run: composer audit
        continue-on-error: true

  # ============================================================================
  # Stage 2: Static Analysis
  # ============================================================================
  static-analysis:
    name: "2. Static Analysis"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

  # ============================================================================
  # Stage 3: Tests (prefer-stable + prefer-lowest)
  # ============================================================================
  tests:
    name: "3. Tests (${{ matrix.stability }})"
    needs: [lint, static-analysis]
    if: needs.lint.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        stability: [prefer-stable, prefer-lowest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            deps-${{ env.PHP_VERSION }}-${{ matrix.stability }}-
            deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: vendor/bin/phpunit --colors=always

  # ============================================================================
  # Stage 4: Architecture Tests (conditional)
  # ============================================================================
  architecture:
    name: "4. Architecture Tests"
    needs: [lint, tests]
    if: needs.lint.outputs.has-test-arch == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run architecture tests
        run: composer test:arch

  # ============================================================================
  # Stage 5: Snapshot Tests (conditional)
  # ============================================================================
  snapshots:
    name: "5. Snapshot Tests"
    needs: [lint, tests]
    if: needs.lint.outputs.has-test-snapshot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run snapshot tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: composer test:snapshot

  # ============================================================================
  # Stage 6: Mutation Testing (conditional, master push only)
  # ============================================================================
  mutation:
    name: "6. Mutation Testing"
    needs: [lint, tests]
    if: |
      needs.lint.outputs.has-test-mutation == 'true'
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run mutation tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          INFECTION_BADGE_API_KEY: ${{ secrets.INFECTION_BADGE_API_KEY }}
        run: composer test:mutation
        timeout-minutes: 30

      - name: Upload Infection report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: infection-report
          path: build/infection/
          retention-days: 14
          if-no-files-found: ignore

  # ============================================================================
  # Stage 7: Code Coverage (conditional, push only)
  # ============================================================================
  coverage:
    name: "7. Code Coverage"
    needs: [lint, tests]
    if: |
      needs.lint.outputs.has-test-coverage == 'true'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Generate coverage report
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: composer test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/coverage/
          retention-days: 14
          if-no-files-found: ignore

  # ============================================================================
  # Stage 8: Manifest & Release Validation
  # ============================================================================
  manifest:
    name: "8. Manifest Validation"
    needs: lint
    if: needs.lint.outputs.has-manifest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ env.PHP_VERSION }}-${{ hashFiles('composer.json') }}
          restore-keys: deps-${{ env.PHP_VERSION }}-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Validate package manifest
        run: php scripts/validate-manifest.php

  release:
    name: "Release Validation"
    needs: [lint, static-analysis, tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate CHANGELOG
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "⚠️ CHANGELOG.md not found (consider adding one)"
            exit 0
          fi

          TAG="${GITHUB_REF#refs/tags/v}"
          if grep -qE "## \[?v?${TAG}\]?" CHANGELOG.md; then
            echo "✅ Version $TAG found in CHANGELOG.md"
          else
            echo "⚠️ Version $TAG not found in CHANGELOG.md (expected for pre-releases)"
          fi
